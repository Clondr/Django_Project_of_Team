{% extends 'base.html' %}
{% block content %}
    <h1>Додати портфоліо</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        {{ media_formset.management_form }}

        {% for media_form in media_formset %}
            {{ media_form.as_p }}
        {% endfor %}

        <button type="submit">Створити портфоліо</button>
    </form>
{% endblock %}
