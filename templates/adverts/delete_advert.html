{% extends 'base.html' %}
{% block title %}Видалення оголошення{% endblock %}
{% block content %}
  <div class="mt-3">
    <p>Ви впевнені, що хочете видалити оголошення?</p>
    <p class="text-muted">{{ advert.advert_title }}</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Видалити</button>
      <a href="{% url 'adverts-list' %}" class="btn btn-secondary">Скасувати</a>
    </form>
  </div>
{% endblock %}
