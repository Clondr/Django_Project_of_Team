{% extends 'base.html' %}
{% block title %}Видалення коментарю{% endblock %}
{% block content %}
  <div class="mt-3">
    <p>Ви впевнені, що хочете видалити коментар?</p>
    <p class="text-muted">{{ forum_comment.comment_title }}</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Видалити</button>
      <a href="{% url 'forum-comments-list' post.pk %}" class="btn btn-secondary">Скасувати</a>
    </form>
  </div>
{% endblock %}
