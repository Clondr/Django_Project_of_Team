{% extends 'base.html' %}
{% block title %}Редагувати повідомлення{% endblock %}
{% block content %}
  <form method="post" class="mt-3">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger">{{ field.errors }}</div>{% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Зберегти</button>
    <a href="{% url 'forum' %}" class="btn btn-secondary">Скасувати</a>
  </form>
{% endblock %}
