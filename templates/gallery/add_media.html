{% extends 'base.html' %}
{% block title %}Додати до галереї{% endblock %}
{% block content %}
  <div class="hstack gap-3 mb-2">
    <h1>Додати до галереї</h1>
  </div>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger">{{ field.errors }}</div>{% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Додати</button>
    <a href="{% url 'gallery-list' %}" class="btn btn-secondary">Скасувати</a>
  </form>
{% endblock %}
