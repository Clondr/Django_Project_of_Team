{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Edit Grade</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary p-2 ms auto">Save changes</button>
    </form>

    <p>
        <a href="{% url 'list-grades' grade.profile.pk %}" class="btn btn-secondary">
            Back to Grades List
        </a>
    </p>
</div>
{% endblock %}
