{% extends 'base.html' %}
{% block title %}Видалити опитування{% endblock %}
{% block content %}
  <div class="hstack gap-3 mb-2">
    <h1>Видалити опитування</h1>
  </div>
  <div class="card mb-2">
    <div class="card-body">
      <p class="card-text">Ви впевнені, що хочете видалити опитування?</p>
      <p class="card-text text-muted">{{ survey.title }}</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Видалити</button>
        <a href="{% url 'surveys-list' %}" class="btn btn-secondary">Скасувати</a>
      </form>
    </div>
  </div>
{% endblock %}
